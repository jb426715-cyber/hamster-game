<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>햄스터 키우기</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="login-screen" class="container">
        <h1>🐹 햄스터 키우기</h1>
        <div class="input-group">
            <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대 10자)" maxlength="10">
            <input type="password" id="password-input" placeholder="비밀번호 입력">
            <button id="start-btn">시작하기 / 로그인</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="header">
            <span id="player-name"></span>님 환영합니다!
            <button id="change-nick-btn">닉네임 변경</button>
            <button id="rank-btn">🏆 랭킹 보기</button>
            <button id="reset-btn">로그아웃</button>
        </div>

        <div class="stats">
            <p>레벨: <span id="level">1</span></p>
            <p>애정도: <span id="love">0 / 100</span></p>
            <p>🌻 해바라기씨: <span id="seeds">0</span>개</p>
        </div>

        <div class="boost-area">
            <button id="use-boost-btn">🔥 피버 타임 (씨앗 1개 소모)</button>
            <p id="boost-status"></p>
        </div>

        <div class="hamster-container">
            <img id="hamster" src="hamster.png" alt="햄스터">
        </div>

        <div class="chat-container">
            <div id="chat-box"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
                <button id="send-chat-btn">전송</button>
            </div>
        </div>
    </div>

    <div id="rank-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 명예의 전당 🏆</h2>
            <ol id="rank-list"></ol>
            <button id="close-rank-btn">닫기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
